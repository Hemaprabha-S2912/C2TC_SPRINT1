<!DOCTYPE html>
<html>
<head>
    <title>Certificate Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🎓 Certificate Management System</h1>

    <div class="form-section">

    <div class="field">
        <label for="c_id">Certificate ID</label>
        <input type="number" id="c_id" placeholder="Enter Certificate ID">
    </div>

    <div class="field">
        <label for="c_name">Certificate Name</label>
        <input type="text" id="c_name" placeholder="Enter Certificate Name">
    </div>

    <div class="field">
        <label for="issuedBy">Issued By</label>
        <input type="text" id="issuedBy" placeholder="Enter Issuer Name">
    </div>

    <div class="field">
        <label for="issueDate">Issue Date</label>
        <input type="date" id="issueDate">
    </div>

    <div class="field">
        <label for="expiryDate">Expiry Date</label>
        <input type="date" id="expiryDate">
    </div>

    <div class="field">
        <label for="course">Course</label>
        <input type="text" id="course" placeholder="Enter Course Name">
    </div>

    <div class="field">
        <label for="studentName">Student Name</label>
        <input type="text" id="studentName" placeholder="Enter Student Name">
    </div>

    <div class="buttons">
        <button onclick="addCertificate()">Add</button>
        <button onclick="updateCertificate()">Update</button>
        <button onclick="clearForm()">Clear</button>
    </div>

</div>

    <div class="search">
        <input type="number" id="searchId" placeholder="Search by ID">
        <button onclick="getCertificateById()">Search</button>
        <button onclick="loadCertificates()">Show All</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Certificate</th>
                <th>Issued By</th>
                <th>Course</th>
                <th>Student</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="certificateTable"></tbody>
    </table>

</div>

<script src="script.js"></script>

</body>
</html>
